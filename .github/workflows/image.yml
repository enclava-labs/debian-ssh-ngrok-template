name: Build Debian SSH ngrok Template Image

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Optional additional image tag to publish. Manual tags must start with manual-."
        required: false
        type: string
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/image.yml"
      - "Dockerfile"
      - "entrypoint.sh"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/image.yml"
      - "Dockerfile"
      - "entrypoint.sh"
      - "README.md"

jobs:
  build-and-push:
    name: Build and push image
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
        (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Validate manual image tag
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag != ''
        env:
          VERSION_TAG: ${{ github.event.inputs.version_tag }}
        run: |
          if [[ ! "${VERSION_TAG}" =~ ^manual-[a-z0-9][a-z0-9_.-]{0,119}$ ]]; then
            echo "::error::Manual image tags must match ^manual-[a-z0-9][a-z0-9_.-]{0,119}$ to avoid spoofing protected deployment tags."
            exit 1
          fi

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/enclava-labs/debian-ssh-ngrok-template
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=${{ github.event.inputs.version_tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version_tag != '' }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

      - name: Write image digest artifact
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p dist
          image_ref="ghcr.io/enclava-labs/debian-ssh-ngrok-template@${{ steps.build.outputs.digest }}"
          printf '%s\n' "${image_ref}" > dist/debian-ssh-ngrok-template-image.txt

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign pushed digest
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ghcr.io/enclava-labs/debian-ssh-ngrok-template
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Upload image digest artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: debian-ssh-ngrok-template-image
          path: dist/debian-ssh-ngrok-template-image.txt
